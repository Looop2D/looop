<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reels</title>
  <link rel="stylesheet" href="style.css">
  <script src="js/components.js" defer></script>
</head>

<body class="reels-page-body">
  <div data-include="header"></div>

  <main class="reels-main">
    <section class="reels-hero-new" aria-labelledby="reels-title">


      <span class="reels-orbit-new reels-orbit-left-new" aria-hidden="true"></span>
      <span class="reels-orbit-new reels-orbit-right-new" aria-hidden="true"></span>
      <span class="reels-target-new" aria-hidden="true"></span>

      <div class="reels-title-wrap">
        <h1 id="reels-title">REELS</h1>
        <p>Pequeñas historias, ideas rápidas y experimentos visuales en formato vertical</p>
      </div>

      <div class="reels-hero-character">
        <img src="img/reels-hero-agostina.png" alt="Agostina mirando el celular">
        <div class="reels-hero-bubble">
          Explora mis<br>
          mejores reels.
        </div>
      </div>

      <span class="reels-hero-dash" aria-hidden="true"></span>
    </section>

    <div class="reels-section-line">
      <span>EXPLORA MIS REELS</span>
      <i></i>
      <b></b>
    </div>

    <section class="reels-gallery" aria-label="Galería de reels">
      <div class="reels-top-row">
        <article class="reels-tile video-thumb">
          <img src="img/reels_portada1.png" alt="Reel 1" class="video-cover">
          <button type="button" class="play-btn" aria-label="Ver reel 1">▶</button>
          <video class="video-player" controls preload="metadata">
            <source src="mp4/reel1.mp4" type="video/mp4">
          </video>
        </article>

        <article class="reels-tile video-thumb">
          <img src="img/reels_portada2.png" alt="Reel 2" class="video-cover">
          <button type="button" class="play-btn" aria-label="Ver reel 2">▶</button>
          <video class="video-player" controls preload="metadata">
            <source src="mp4/reel2.mp4" type="video/mp4">
          </video>
        </article>

        <article class="reels-tile video-thumb">
          <img src="img/reels_portada3.png" alt="Reel 3" class="video-cover">
          <button type="button" class="play-btn" aria-label="Ver reel 3">▶</button>
          <video class="video-player" controls preload="metadata">
            <source src="mp4/reel3.mp4" type="video/mp4">
          </video>
        </article>

        <article class="reels-tile video-thumb">
          <img src="img/reels_portada4.png" alt="Reel 4" class="video-cover">
          <button type="button" class="play-btn" aria-label="Ver reel 4">▶</button>
          <video class="video-player" controls preload="metadata">
            <source src="mp4/reel4.mp4" type="video/mp4">
          </video>
        </article>

        <div class="reels-side-character">
          <img src="img/reels-personaje-saludo.png" alt="Agostina saludando">
        </div>
      </div>

      <div class="reels-bottom-row">
        <div class="reels-seated-character">
          <img src="img/reels-personaje-laptop.png" alt="Agostina sentada con laptop">
        </div>

        <article class="reels-tile video-thumb">
          <img src="img/reels_portada5.png" alt="Reel 5" class="video-cover">
          <button type="button" class="play-btn" aria-label="Ver reel 5">▶</button>
          <video class="video-player" controls preload="metadata">
            <source src="mp4/reel5.mp4" type="video/mp4">
          </video>
        </article>

        <article class="reels-tile video-thumb">
          <img src="img/reels_portada6.png" alt="Reel 6" class="video-cover">
          <button type="button" class="play-btn" aria-label="Ver reel 6">▶</button>
          <video class="video-player" controls preload="metadata">
            <source src="mp4/reel6.mp4" type="video/mp4">
          </video>
        </article>

        <article class="reels-tile video-thumb">
          <img src="img/reels_portada7.png" alt="Reel 7" class="video-cover">
          <button type="button" class="play-btn" aria-label="Ver reel 7">▶</button>
          <video class="video-player" controls preload="metadata">
            <source src="mp4/reel7.mp4" type="video/mp4">
          </video>
        </article>

        <article class="reels-tile video-thumb">
          <img src="img/reels_portada8.png" alt="Reel 8" class="video-cover">
          <button type="button" class="play-btn" aria-label="Ver reel 8">▶</button>
          <video class="video-player" controls preload="metadata">
            <source src="mp4/reel8.mp4" type="video/mp4">
          </video>
        </article>
      </div>
    </section>
  </main>

  <div data-include="footer"></div>
</body>
</html>
