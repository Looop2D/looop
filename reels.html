<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reels</title>
  <link rel="stylesheet" href="style.css">
  <script src="components.js" defer></script>
</head>

<body class="reels-page-body">
  <div data-include="header"></div>

  <main class="reels-main">
    <section class="reels-hero-new" aria-labelledby="reels-title">
      <div class="reels-camera-meta">
        <span class="reels-rec-block" aria-hidden="true"></span>
        <div>
          <p>00:00:01</p>
          <span>ANIMACIÓN 2D</span>
          <span>MOTION GRAPHICS</span>
          <span>CORTOMETRAJES</span>
          <b>REC</b>
        </div>
      </div>

      <span class="reels-orbit-new reels-orbit-left-new" aria-hidden="true"></span>
      <span class="reels-orbit-new reels-orbit-right-new" aria-hidden="true"></span>
      <span class="reels-target-new" aria-hidden="true"></span>

      <div class="reels-title-wrap">
        <h1 id="reels-title">REELS</h1>
        <p>Pequeñas historias, ideas rápidas y experimentos visuales en formato vertical</p>
      </div>

      <div class="reels-hero-character">
        <img src="img/reels-hero-agostina.png" alt="Agostina mirando el celular">
        <div class="reels-hero-bubble">
          Historias cortas,<br>
          impacto grande.
          <span>♥</span>
        </div>
      </div>

      <span class="reels-hero-dash" aria-hidden="true"></span>
    </section>

    <div class="reels-section-line">
      <span>EXPLORA MIS REELS</span>
      <i></i>
      <b></b>
    </div>

    <section class="reels-gallery" aria-label="Galería de reels">
      <div class="reels-top-row">
        <article class="reels-tile">
          <img src="img/reels_portada1.png" alt="Reel 1">
          <button type="button" aria-label="Ver reel 1">▶</button>
        </article>

        <article class="reels-tile">
          <img src="img/reels_portada2.png" alt="Reel 2">
          <button type="button" aria-label="Ver reel 2">▶</button>
        </article>

        <article class="reels-tile">
          <img src="img/reels_portada3.png" alt="Reel 3">
          <button type="button" aria-label="Ver reel 3">▶</button>
        </article>

        <article class="reels-tile">
          <img src="img/reels_portada4.png" alt="Reel 4">
          <button type="button" aria-label="Ver reel 4">▶</button>
        </article>

        <div class="reels-side-character">
          <img src="img/reels-personaje-saludo.png" alt="Agostina saludando">
          <div>
            ¡Gracias por estar acá!<br>
            Te muestro mis<br>
            mejores reels
          </div>
        </div>
      </div>

      <div class="reels-bottom-row">
        <div class="reels-seated-character">
          <img src="img/reels-personaje-laptop.png" alt="Agostina sentada con laptop">
        </div>

        <article class="reels-tile">
          <img src="img/reels_portada5.png" alt="Reel 5">
          <button type="button" aria-label="Ver reel 5">▶</button>
        </article>

        <article class="reels-tile">
          <img src="img/reels_portada6.png" alt="Reel 6">
          <button type="button" aria-label="Ver reel 6">▶</button>
        </article>

        <article class="reels-tile">
          <img src="img/reels_portada7.png" alt="Reel 7">
          <button type="button" aria-label="Ver reel 7">▶</button>
        </article>

        <article class="reels-tile">
          <img src="img/reels_portada8.png" alt="Reel 8">
          <button type="button" aria-label="Ver reel 8">▶</button>
        </article>
      </div>
    </section>
  </main>

  <div data-include="footer"></div>
</body>
</html>
